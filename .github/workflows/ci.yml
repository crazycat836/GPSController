name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A push to main while a PR is open against the same branch would
# otherwise queue two redundant runs. Cancel any in-flight job on the
# same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layer-check:
    name: Backend layer check (api -> core -> services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python3 tools/check_layers.py

  ws-codegen-fresh:
    name: WS contract codegen is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pydantic + uvicorn (codegen deps)
        run: pip install pydantic uvicorn
      - name: Re-run codegen
        run: python3 tools/gen_ws_types.py
      - name: Diff against committed file
        run: |
          if ! git diff --exit-code -- frontend/src/generated/api-contract.ts; then
            echo "::error::frontend/src/generated/api-contract.ts is stale."
            echo "Run 'python3 tools/gen_ws_types.py' and commit the result."
            exit 1
          fi

  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: TypeScript type-check
        run: ./node_modules/.bin/tsc --noEmit -p tsconfig.json
      - name: Vitest
        run: npm test

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime deps
        run: pip install -r requirements.txt
        continue-on-error: true
      - name: Install test deps
        run: pip install pytest pytest-asyncio pydantic fastapi uvicorn httpx
      - name: pytest
        run: python3 -m pytest tests -v
